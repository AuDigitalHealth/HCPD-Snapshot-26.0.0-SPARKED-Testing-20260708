      BatchRequestDelete.md:
        title: Batch Request Delete
  security-and-privacy.md:
    title: Security and Privacy
  artifacts.html:
    title: FHIR Artefacts
    profiles-and-extensions.md:
      title: Profiles and Extensions
    pbprn-systems.md:
      title: PBPRN Supported Systems
    terminology.md:
      title: Terminology
    actors.md:
      title: Actor Definitions
    capability-statements.md:
      title: Capability Statements
    search-parameters.md:
      title: Search Parameters
  examples.md:
    title: Examples
  support.md:
    title: Support
    known-issues.md:
      title: Known Issues
    downloads.md:
      title: Downloads
  changelog.md:
    title: Change Log
    contributing.md:
      title: Contributing
  legal.md:
    title: Licence and Legal

#
#
# The parameters property represents IG.definition.parameter. Rather
# than a list of code/value pairs (as in the ImplementationGuide
# resource), the code is the YAML key. If a parameter allows repeating
# values, the value in the YAML should be a sequence/array.
# For parameters defined by core FHIR see:
# http://build.fhir.org/codesystem-guide-parameter-code.html
# For parameters defined by the FHIR Tools IG see:
# http://build.fhir.org/ig/FHIR/fhir-tools-ig/branches/master/CodeSystem-ig-parameters.html
#
parameters:  # see https://confluence.hl7.org/display/FHIR/Implementation+Guide+Parameters
  path-resource:
    input/resources
    fsh-generated/resources
  path-pages:
    - input/pagecontent
    - input/intro-notes
    - fsh-generated/includes
    - input/resources  
    #- input/summaries
  path-expansion-params: '../../input/_resources/exp-params.json' 
  # active-tables: false
  apply-contact: true
  apply-jurisdiction: true
  apply-publisher: true
  apply-version: true
  apply-copyright: true
  default-copyright: true
  show-inherited-invariants: false
  usage-stats-opt-out: true
  excludexml: false
  excludejson: false
  excludettl: false
  excludemap: true
  shownav: false
  # generate: #what does this do - todo: remove and see4
  #   - xml
  #   - json
  # no-validate:
  #   - '*/*'  # does not seems to work
  #   - 'StructureDefinition/*'
  # html-exempt:  
  # ipa-comparison: 
  #   - '{current}'
  logging:
    - tx #tx: Messages describing the use of the terminology server (for debugging)
    - html #html: Log when validating an html page (troubleshooting only - leave off)
    - generate #generate: Log when producing an individual resource (troubleshooting only - leave off)
    - init #init: Messages describing the start up process (for debugging)
    - progress #progress: Overall progress messages

  # pin-canonical documentation: https://build.fhir.org/ig/FHIR/ig-guidance/branches/master/pinning.html
  # pin-canonical discussion: https://chat.fhir.org/#narrow/channel/179252-IG-creation/topic/Canonical.20Pinning/with/534497073
  # pin-canonicals can be set to 'pin-none', 'pin-specified', or 'pin-all'
  pin-canonicals: pin-all

